<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ffae00" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a859" />
      <stop offset="100%" stop-color="#00e676" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#181824" />
      <stop offset="100%" stop-color="#0b0b10" />
    </radialGradient>
    <!-- Drop Shadows / Glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8" />

  <!-- Symmetrical Orange and Green Borders (Sarkari Babu Pride) -->
  <path d="M 256,24 A 232,232 0 0,0 24,256 A 232,232 0 0,0 256,488" fill="none" stroke="url(#orangeGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 256,24 A 232,232 0 0,1 488,256 A 232,232 0 0,1 256,488" fill="none" stroke="url(#greenGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />

  <!-- Styled Book / Star Emblem in the Center -->
  <g transform="translate(128, 128) scale(1.0)" filter="url(#glow)">
    <!-- Shield / Book pages base -->
    <path d="M 128,24 L 216,72 L 216,184 Q 128,240 40,184 L 40,72 Z" fill="#1e1e2d" stroke="url(#orangeGrad)" stroke-width="6" />
    
    <!-- Open Book Pages (Symmetric) -->
    <path d="M 128,208 C 88,188 56,192 48,190 L 48,96 C 56,98 88,94 128,114 Z" fill="#ffffff" opacity="0.95" />
    <path d="M 128,208 C 168,188 200,192 208,190 L 208,96 C 200,98 168,94 128,114 Z" fill="#ffffff" opacity="0.85" />
    
    <!-- Golden Star of Success -->
    <polygon points="128,32 136,54 158,54 140,68 147,90 128,76 109,90 116,68 98,54 120,54" fill="#ffd700" />
    
    <!-- Bookmark ribbon -->
    <path d="M 124,110 L 132,110 L 132,216 L 128,206 L 124,216 Z" fill="url(#greenGrad)" />
  </g>
</svg>